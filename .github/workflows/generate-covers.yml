name: Generate Notion Covers

on:
  workflow_dispatch:
    inputs:
      only_tickers:
        description: "Comma-separated tickers to generate, for example FROG,SNOW,PANW. Leave empty for all."
        required: false
        default: "FROG"
  push:
    paths:
      - ".github/workflows/generate-covers.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate cover images
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ONLY_TICKERS: ${{ github.event.inputs.only_tickers || 'FROG' }}
          RUN_STAGE: generate
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python generate_covers.py

      - name: Commit generated covers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add covers/*.png || true
          if git diff --cached --quiet; then
            echo "No cover changes to commit"
          else
            git commit -m "Generate company covers"
          fi

      - name: Push changes
        run: git push

      - name: Update Notion covers after publish
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ONLY_TICKERS: ${{ github.event.inputs.only_tickers || 'FROG' }}
          RUN_STAGE: notion
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python generate_covers.py
